<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>kahzaabu — admin queue</title>
<link rel="stylesheet" href="/static/css/kahzaabu.css" />
</head>
<body>
<header class="site">
    <div class="brand">kahzaabu <span class="tag">admin · review queue</span></div>
    <nav>
        <a href="/"             data-nav="dashboard">Public site</a>
        <a href="/admin/queue"  data-nav="admin-queue">Queue</a>
        <a href="/admin/run"    data-nav="admin-run">Run pipeline</a>
        <a href="#" id="logout">Log out</a>
    </nav>
</header>

<main>
    <h1>Review queue</h1>
    <p class="muted" id="meta">Loading…</p>

    <section class="filters">
        <select id="category">
            <option value="">all categories</option>
            <option value="LIE">LIE</option>
            <option value="CONTRADICTION">CONTRADICTION</option>
            <option value="MISLEADING">MISLEADING</option>
            <option value="SHIFTING NUMBERS">SHIFTING NUMBERS</option>
            <option value="CREDIT THEFT">CREDIT THEFT</option>
            <option value="BROKEN DEADLINE">BROKEN DEADLINE</option>
        </select>
        <button id="apply">Apply</button>
        <button id="bulkpublish" style="background: var(--good); color: #000;">Publish selected</button>
        <span id="selected-count" class="dim mt8" style="margin-left: 8px;"></span>
    </section>

    <section id="items"></section>
</main>

<footer class="site">Admin moderation. Items are not public until you publish them.</footer>

<script src="/static/js/api.js"></script>
<script>
const state = { selected: new Set() };

async function loadQueue() {
    const cat = document.getElementById("category").value;
    let url = "/api/admin/queue?limit=100";
    if (cat) url += "&category=" + encodeURIComponent(cat);
    let data;
    try {
        data = await fetchJSON(url);
    } catch (e) {
        if (e.message.includes("401")) {
            window.location.href = "/login?next=/admin/queue";
            return;
        }
        document.getElementById("meta").textContent = "Error: " + e.message;
        return;
    }
    document.getElementById("meta").textContent =
        `${data.total_pending} fact-checks pending review — reviewer: ${data.reviewer}`;
    const c = document.getElementById("items");
    c.innerHTML = "";
    state.selected.clear();
    updateSelectedCount();
    for (const it of data.items) {
        c.appendChild(renderItem(it));
    }
}

function renderItem(it) {
    const div = el("div", { class: `fc-item ${catClass(it.category)}` });
    const head = el("div", { class: "head" });
    const cb = el("input", { type: "checkbox", id: "cb-" + it.id, style: "margin-right: 8px;",
                              onchange: () => toggleSelect(it.id, cb.checked) });
    head.appendChild(cb);
    head.appendChild(el("span", { class: `badge ${catBadgeClass(it.category)}` }, it.category));
    head.appendChild(el("span", { class: "date" }, fmtDate(it.claim_date)));
    if (it.topic) head.appendChild(el("span", { class: "topic" }, it.topic));
    if (it.n_evidence) head.appendChild(el("span", { class: "topic", style: "color: var(--good);" }, `🌐 ${it.n_evidence} sources`));
    head.appendChild(el("span", { class: "dim" }, `#${it.id} · ${it.source || ''}`));
    div.appendChild(head);
    div.appendChild(el("div", { class: "claim" }, it.claim || ""));
    if (it.what_actually_happened)
        div.appendChild(el("div", { class: "body" }, it.what_actually_happened));
    if (it.evidence_quotes && it.evidence_quotes.length) {
        const qbox = el("div", { class: "quotes" });
        for (const q of it.evidence_quotes.slice(0, 2))
            qbox.appendChild(el("div", { class: "quote" }, '"' + q + '"'));
        div.appendChild(qbox);
    }
    if (it.source_article_ids && it.source_article_ids.length) {
        const links = el("div", { class: "dim", style: "font-size: 12px; margin-top: 10px;" }, "Sources: ");
        it.source_article_ids.forEach(aid => {
            links.appendChild(el("a", { href: `/article/${aid}`, target: "_blank" }, `[${aid}]`));
            links.appendChild(document.createTextNode(" "));
        });
        div.appendChild(links);
    }
    // actions
    const actions = el("div", { class: "mt16", style: "display: flex; gap: 8px; align-items: center;" });
    const summary = el("input", { type: "text", id: "ps-" + it.id, class: "ask-input",
        style: "flex: 1; padding: 6px 10px; font-size: 13px;",
        placeholder: "(optional) public summary override — leave blank to use 'claim' field",
        value: it.public_summary || "" });
    const pub = el("button", { class: "ask-button", style: "padding: 6px 14px; font-size: 13px;",
        onclick: () => publishOne(it.id, true) }, "Publish");
    const rej = el("button", { class: "clear", style: "padding: 6px 14px; font-size: 13px;",
        onclick: () => publishOne(it.id, false) }, "Reject (unpublish)");
    actions.appendChild(summary);
    actions.appendChild(pub);
    actions.appendChild(rej);
    div.appendChild(actions);
    return div;
}

function toggleSelect(id, on) {
    if (on) state.selected.add(id); else state.selected.delete(id);
    updateSelectedCount();
}
function updateSelectedCount() {
    document.getElementById("selected-count").textContent =
        state.selected.size ? `${state.selected.size} selected` : "";
}

async function publishOne(id, publish) {
    const summary = document.getElementById("ps-" + id).value.trim() || null;
    try {
        await fetchJSON(`/api/admin/factcheck/${id}/publish`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ publish, public_summary: summary }),
        });
        loadQueue();
    } catch (e) {
        alert("failed: " + e.message);
    }
}

async function bulkPublish() {
    if (state.selected.size === 0) { alert("select at least one item"); return; }
    if (!confirm(`Publish ${state.selected.size} selected fact-checks?`)) return;
    try {
        await fetchJSON("/api/admin/factcheck/bulk-publish", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(Array.from(state.selected)),
        });
        loadQueue();
    } catch (e) {
        alert("failed: " + e.message);
    }
}

document.getElementById("apply").addEventListener("click", loadQueue);
document.getElementById("bulkpublish").addEventListener("click", bulkPublish);
document.getElementById("logout").addEventListener("click", async (e) => {
    e.preventDefault();
    await fetchJSON("/api/logout", { method: "POST" });
    window.location.href = "/login";
});

loadQueue();
</script>
</body>
</html>
