name: kahzaabu
version: 0.2.0
description: "REFERENCE IMPLEMENTATION (educational / research) — a sample Hermes Agent plugin demonstrating a domain-specific fact-checking tool surface. Output is automated analysis, NOT an authoritative source; agents must not present verdicts as findings of fact and should direct users to the underlying press release on presidency.gov.mv for any quote. Exposes 13 agent tools (stats, ask, list_lies, get_factcheck, manifesto, get_article, recent_activity, constitution_lookup, pipeline_run, search_articles, search_factchecks, get_promise, run_eval) over a curated SQLite corpus of 3,000+ Maldives Presidency articles, 9,800+ claims, 200+ fact-checks, 700+ manifesto promises, and 301 Constitution articles. Also registers a `hermes kahzaabu` CLI subcommand and a `/kahzaabu` slash command available in any chat session including messaging gateway (Telegram, WhatsApp, Slack, Discord). 'Kahzaabu' and 'Muizzu' refer to the same person."
author: Sofwathullah.Mohamed@gmail.com
license: Apache-2.0
kind: standalone
platforms:
  - linux
  - macos
provides_tools:
  - kahzaabu_stats
  - kahzaabu_ask
  - kahzaabu_list_lies
  - kahzaabu_get_factcheck
  - kahzaabu_manifesto
  - kahzaabu_get_article
  - kahzaabu_recent_activity
  - kahzaabu_constitution_lookup
  - kahzaabu_pipeline_run
  - kahzaabu_search_articles
  - kahzaabu_search_factchecks
  - kahzaabu_get_promise
  - kahzaabu_run_eval
provides_slash_commands:
  - /kahzaabu             # backwards-compat alias for /kahzaabu-ask
  - /kahzaabu-ask         # natural-language Q&A (agentic loop)
  - /kahzaabu-recent      # articles from last N days
  - /kahzaabu-stats       # archive snapshot
  - /kahzaabu-promise     # search 2023 manifesto promises
  - /kahzaabu-factcheck   # fetch one fact-check by id
provides_cli_subcommands:
  - hermes kahzaabu

# Hermes auto-prompts the user for these on `hermes plugin install kahzaabu`
# and surfaces them in `hermes config`. Rich-dict form lets us contribute
# description / prompt / url / password metadata so the setup wizard shows
# real guidance instead of a bare variable name.
requires_env:
  - name: ANTHROPIC_API_KEY
    description: "Anthropic API key. Used by the agentic Q&A loop (kahzaabu_ask) and the narrative-tricks guarantee-pass. Without it the ask tool falls back to a deterministic-only response that won't read the article body or do web search."
    prompt: "Anthropic API key"
    url: "https://console.anthropic.com/settings/keys"
    password: true

optional_env:
  - name: OPENROUTER_API_KEY
    description: "OpenRouter API key — alternative provider for the agentic Q&A loop. Useful if you don't have direct Anthropic access. Either this or ANTHROPIC_API_KEY is enough."
    prompt: "OpenRouter API key (optional)"
    url: "https://openrouter.ai/keys"
    password: true
  - name: KAHZAABU_ALLOW_PIPELINE
    description: "Set to '1' to enable the kahzaabu_pipeline_run tool. The pipeline costs real LLM money (typical run is 1-3 USD); gated by default so an agent can't accidentally burn budget. Legacy env var KAHZAABU_MCP_ALLOW_PIPELINE is still honoured."
    prompt: "Enable pipeline tool? (1 = yes, empty = no)"
    password: false
  - name: KAHZAABU_AMBIENT_DISABLE
    description: "Set to '1' to disable the pre_llm_call ambient-injection hook. By default, when a user mentions Maldivian-politics topics in any hermes chat, the plugin auto-injects 1-3 relevant fact-checks as context. Disabling makes kahzaabu act as a pure on-demand tool."
    prompt: "Disable ambient hook? (1 = disable)"
    password: false
  - name: KAHZAABU_AMBIENT_PLATFORMS
    description: "Comma-separated allowlist of platforms where the ambient hook may fire. Unset = all platforms. Example: 'cli,telegram' enables ambient injection on the terminal and Telegram DMs but keeps it quiet on group chats (slack, discord). Useful when you want kahzaabu's grounding in your personal flow without surprising other participants in group conversations."
    prompt: "Platform allowlist (e.g. cli,telegram) or empty for all"
    password: false
  - name: KAHZAABU_DB
    description: "Path to the SQLite DB. Defaults to ~/.kahzaabu/kahzaabu.db. Override if you've installed kahzaabu in a non-standard location."
    prompt: "Override DB path? (leave empty for default)"
    password: false
  - name: KAHZAABU_FOLLOWUP_TTL_SECONDS
    description: "TTL for the ambient hook's corpus-derived follow-up vocabulary cache (defaults to 21600 = 6 hours). The hook re-reads fact_checks.topic from the DB after this interval so a long-lived hermes daemon picks up new pipeline-generated topics without restart. Dial down (e.g., 600) on deployments that run the pipeline frequently."
    prompt: "Follow-up vocab TTL in seconds (leave empty for default 21600)"
    password: false

hooks:
  # Ambient context injection: when a user's message mentions Maldivian-
  # politics topics, the hook prefilters cheaply (regex) and, on match,
  # injects 1-3 relevant fact-checks + constitution articles as context
  # for that turn. Opt-out: KAHZAABU_AMBIENT_DISABLE=1.
  - pre_llm_call
